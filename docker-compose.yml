services:
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-exporter
    restart: unless-stopped
    ports:
      - "9400:9400"
    cap_add:
      - SYS_ADMIN
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      DCGM_EXPORTER_INTERVAL: 1000

 